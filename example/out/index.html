<!DOCTYPE HTML>
<html>
  <script type="text/javascript" src="loader.js"></script>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      console.log("domLoaded")
      loader = new ShardLoader("data")
      document.getElementById("queryText").value = "ten"
      document.getElementById("countBefore").value = "1"
      document.getElementById("countAfter").value = "1"
      function putResult(content) {
        document.getElementById("result").textContent = "Latest result: " + content
      }
      function display(text) {
        document.getElementById("log").innerHTML += text + "<p/>"
      }
      document.getElementById("queryKeysButton").onclick = async function() {
        queryText = document.getElementById("queryText").value
        countBefore = document.getElementById("countBefore").value
        countAfter = document.getElementById("countAfter").value
        result = await loader.getNeighborhoodKeys(queryText, countBefore, countAfter, display)
        putResult(result)
      }
      document.getElementById("queryValuesButton").onclick = async function() {
        queryText = document.getElementById("queryText").value
        countBefore = document.getElementById("countBefore").value
        countAfter = document.getElementById("countAfter").value
        result = await loader.getNeighborhoodValues(queryText, countBefore, countAfter, display)
        putResult(result)
      }
      document.getElementById("queryEntriesButton").onclick = async function() {
        queryText = document.getElementById("queryText").value
        countBefore = document.getElementById("countBefore").value
        countAfter = document.getElementById("countAfter").value
        result = await loader.getNeighborhoodEntries(queryText, countBefore, countAfter, display)
        putResult(result)
      }
    })
  </script>
  <div id="content">
    <div id="controls">
      <div>Query Text:
        <input type="text" id="queryText"/>
      </div>
      <div>Request count before:
        <input type="text" id="countBefore"/>
      </div>
      <div>Request count after:
        <input type="text" id="countAfter"/>
      </div>
      <button id="queryKeysButton">get nearby keys</button>
      <button id="queryValuesButton">get nearby values</button>
      <button id="queryEntriesButton">get nearby entries</button>
    </div>
    <div id="result">
    </div>
    <div id="log">Log:</div>
    <div id="reminder">
      Refresh the page to clear the log
    </div>
  </div>
</html>
