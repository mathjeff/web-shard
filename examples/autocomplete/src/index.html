<!DOCTYPE HTML>
<html>
  <script type="text/javascript" src="web-shard.js"></script>
  <script type="text/javascript" src="autoComplete.min.js"></script>
  <link href="./autoComplete.css" rel="stylesheet"/>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
      console.log("domLoaded")

      loader = new ShardMap("data")
      async function getChoices() {
        let queryText = document.getElementById("query").value
        // search for nearby results in our list
        let neighborhood = await loader.getNeighborhoodKeys(queryText, 10, 10)
        return neighborhood
      }
      async function showResults(query) {
        let result = await loader.get(query)
        let container = document.getElementById("results")
        if (result) {
          container.textContent = query + " is " + result
        } else {
          container.textContent = query + " not found"
        }
      }
      const autocompleter = new autoComplete({
        selector: "#query",
        data: {
          src: getChoices,
          cache: false
        }
      })
      autocompleter.input.addEventListener("selection", function (event) {
        // update search box text to match selection
        const feedback = event.detail;
        autocompleter.input.blur();
        const selection = feedback.selection.value
        document.querySelector("#query").innerHTML = selection;
        autocompleter.input.value = selection;
        console.log(feedback);
        // show results
        showResults(selection)
      });
    })
  </script>
  <div id="content">
    <h1>Webshard Autocomplete Demo</h1>
    <div id="instructions">
      This website converts from words (like 'ten') to numbers (like 10).<br/>
      This website uses a lazy sorted map from word to number.<br/>
      This website also can find other entries that are alphabetically nearby, to help with spelling mistakes</br>
    </div>
    <div id="controls">
      <h2>Search:</h2>
      <input type="text" id="query"></input>
    </div>
    <div id="results"></div>
  </div>
</html>
